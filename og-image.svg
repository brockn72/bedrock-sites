<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Bedrock Digital — Business tools built for contractors.">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D1B2E"/>

  <!-- Gold accent edge -->
  <rect x="0" y="0" width="18" height="630" fill="#C9922A"/>

  <!-- Strata mark (right side) — matches the Bedrock brand bars -->
  <g transform="translate(870, 110)">
    <rect x="0"  y="0"   width="190" height="22" fill="#C9922A"/>
    <rect x="32" y="40"  width="150" height="22" fill="#F0C46A"/>
    <rect x="14" y="80"  width="172" height="22" fill="#2E5A8E"/>
    <rect x="54" y="120" width="128" height="22" fill="#4A7DB5"/>
  </g>

  <!-- Wordmark — "Bedrock" + DIGITAL -->
  <text x="92" y="340"
        font-family="Georgia, 'Cormorant Garamond', 'Times New Roman', serif"
        font-size="170" font-weight="700" letter-spacing="-5"
        fill="#F5E6C8">Bedrock</text>
  <text x="96" y="394"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="30" font-weight="700" letter-spacing="20"
        fill="#C9922A">DIGITAL</text>

  <!-- Tagline -->
  <text x="92" y="498"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="42" font-weight="400"
        fill="#FFFFFF">Business tools built for contractors.</text>

  <!-- URL -->
  <text x="92" y="568"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="500" letter-spacing="3"
        fill="#C9922A" opacity="0.75">bedrock-sites.com</text>
</svg>
