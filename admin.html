<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedrock Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 68 68'%3E%3Crect width='68' height='68' rx='14' fill='%230D1B2E'/%3E%3Crect x='7' y='4.25' width='10' height='60.35' fill='%23C9922A'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy-deep:#0D1B2E;--navy:#1B3557;--navy-mid:#2E5A8E;
  --gold:#C9922A;--gold-light:#D4A843;
  --off-white:#FAF7F2;--white:#FFFFFF;--slate:#4A5568;--cream:#F5E6C8;
  --border:rgba(13,27,46,0.1);
  --red:#b91c1c;--red-bg:#fef2f2;--green:#3b6d11;--green-bg:#f0f5ea;
  --amber:#92660e;--amber-bg:#fdf6e3;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--navy-deep);min-height:100vh;line-height:1.5}

/* ── HEADER ── */
.bar{background:var(--navy-deep);color:#fff;padding:0.95rem 1.6rem;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:30}
.bar h1{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700}
.bar h1 span{color:var(--gold);font-size:0.66rem;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;margin-left:0.6rem;vertical-align:middle}
.bar-right{display:flex;align-items:center;gap:0.7rem;font-size:0.78rem;color:rgba(255,255,255,0.7)}
.bar-right button{background:transparent;border:1px solid rgba(255,255,255,0.18);color:#fff;font-family:inherit;font-size:0.66rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:0.5rem 0.9rem;border-radius:5px;cursor:pointer}
.bar-right button:hover{border-color:var(--gold);color:var(--gold)}

/* ── PASSWORD GATE ── */
.gate{min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem}
.gate-card{background:#fff;border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:10px;padding:2rem 1.85rem;max-width:380px;width:100%;box-shadow:0 8px 24px rgba(13,27,46,0.08)}
.gate-card h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--navy-deep);margin-bottom:0.35rem}
.gate-card p{font-size:0.84rem;color:var(--slate);line-height:1.6;margin-bottom:1.2rem}
.gate-card input{width:100%;padding:0.7rem 0.85rem;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:0.92rem;color:var(--navy-deep);outline:none;margin-bottom:0.7rem}
.gate-card input:focus{border-color:var(--navy-deep)}
.gate-card button{width:100%;background:var(--navy-deep);color:#fff;border:none;padding:0.75rem;font-family:inherit;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;border-radius:7px;cursor:pointer}
.gate-card button:hover{background:var(--gold);color:#fff}
.gate-card button:disabled{opacity:0.5;cursor:not-allowed}
.gate-err{color:var(--red);background:var(--red-bg);border-left:3px solid var(--red);padding:0.55rem 0.8rem;border-radius:4px;font-size:0.78rem;margin-bottom:0.7rem;display:none}
.gate-err.show{display:block}

/* ── DASHBOARD ── */
.dash{max-width:1240px;margin:0 auto;padding:1.5rem 1.5rem 4rem}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:var(--navy-deep);margin:2rem 0 0.7rem}
.section-title:first-child{margin-top:0.5rem}

/* ── OVERVIEW CARDS ── */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
@media(max-width:880px){.cards{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.cards{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid var(--border);border-top:3px solid var(--navy-deep);border-radius:7px;padding:1rem 1.15rem}
.card.gold{border-top-color:var(--gold)}
.card.red{border-top-color:var(--red);background:var(--red-bg)}
.card .lbl{font-size:0.58rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--slate);margin-bottom:0.45rem}
.card .val{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--navy-deep);line-height:1}
.card.red .val{color:var(--red)}
.card .sub{font-size:0.68rem;color:var(--slate);margin-top:0.35rem;line-height:1.4}
.card .sub strong{color:var(--navy-deep)}

/* ── TABLES ── */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:1.5rem}
.tbl{width:100%;border-collapse:collapse;font-size:0.82rem}
.tbl-scroll{overflow-x:auto}
.tbl th{text-align:left;font-size:0.56rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--slate);padding:0.75rem 1rem;border-bottom:1px solid var(--border);background:var(--off-white);white-space:nowrap}
.tbl td{padding:0.78rem 1rem;border-bottom:1px solid var(--border);color:var(--navy-deep);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--off-white)}
.tbl .name{font-weight:600}
.tbl .muted{color:var(--slate);font-size:0.74rem}
.tbl a{color:var(--navy-mid);text-decoration:none}
.tbl a:hover{color:var(--gold);text-decoration:underline}
.tool-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#cfd6dd;margin-right:5px;vertical-align:middle}
.tool-dot.on{background:#3b6d11}
.tool-row{display:flex;gap:0.8rem;flex-wrap:wrap;font-size:0.7rem;color:var(--slate)}
.tool-row span{white-space:nowrap}
.pill{display:inline-block;font-size:0.58rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:0.22rem 0.55rem;border-radius:99px;white-space:nowrap}
.pill.active{background:var(--green-bg);color:var(--green)}
.pill.past_due{background:var(--amber-bg);color:var(--amber)}
.pill.canceled{background:var(--red-bg);color:var(--red)}
.pill.admin{background:rgba(201,146,42,0.16);color:var(--gold)}
/* Pre-beta task #3: profile completion badge in the Signups table. */
.pct{display:inline-block;font-size:0.66rem;font-weight:700;padding:0.18rem 0.5rem;border-radius:5px;min-width:38px;text-align:center}
.pct.pct-ok{background:var(--green-bg);color:var(--green)}
.pct.pct-mid{background:var(--amber-bg);color:var(--amber)}
.pct.pct-low{background:var(--red-bg);color:var(--red)}
.empty{padding:1.5rem;text-align:center;color:var(--slate);font-size:0.86rem}

/* ── RECENT ACTIVITY ── */
.feed{background:#fff;border:1px solid var(--border);border-radius:7px;padding:0.4rem 1rem;margin-bottom:1.5rem}
.feed-row{display:flex;align-items:center;gap:0.85rem;padding:0.7rem 0;border-bottom:1px dashed var(--border);font-size:0.84rem}
.feed-row:last-child{border-bottom:none}
.feed-type{font-size:0.56rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;width:60px;flex-shrink:0}
.feed-type.estimate{color:#3b6d11}
.feed-type.invoice{color:#23496f}
.feed-row .feed-who{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed-row .feed-amt{font-weight:700;white-space:nowrap}
.feed-row .feed-when{font-size:0.7rem;color:var(--slate);white-space:nowrap}

/* ── FAILED PAYMENTS ── */
.failed{background:#fff;border:1px solid rgba(185,28,28,0.25);border-top:3px solid var(--red);border-radius:7px;padding:1rem 1.2rem;margin-bottom:1.5rem}
.failed .row{display:flex;flex-wrap:wrap;gap:0.6rem;align-items:center;padding:0.55rem 0;border-bottom:1px dashed var(--border);font-size:0.82rem}
.failed .row:last-child{border-bottom:none}
.failed .who{font-weight:600;flex:1;min-width:160px}
.failed .cust-id{font-family:ui-monospace,monospace;font-size:0.72rem;color:var(--slate)}

.loading{text-align:center;padding:3rem 1rem;color:var(--slate);font-size:0.9rem}
.err-banner{background:var(--red-bg);border-left:3px solid var(--red);color:var(--red);padding:0.7rem 1rem;border-radius:5px;font-size:0.84rem;margin-bottom:1rem}
</style>
</head>
<body>

<div class="bar">
  <h1>Bedrock <span>Admin</span></h1>
  <div class="bar-right">
    <span id="barUser"></span>
    <button id="signOutBtn" onclick="signOut()" style="display:none">Sign Out</button>
  </div>
</div>

<!-- ── PASSWORD GATE ── -->
<div id="gate" class="gate">
  <form class="gate-card" onsubmit="tryUnlock(event)">
    <h2>Admin access</h2>
    <p>Enter the admin password to view contractor stats, subscriptions, and recent activity.</p>
    <div id="gateErr" class="gate-err"></div>
    <input id="gatePw" type="password" placeholder="Password" autocomplete="current-password" autofocus>
    <button id="gateBtn" type="submit">Unlock dashboard</button>
  </form>
</div>

<!-- ── DASHBOARD ── -->
<div id="dash" class="dash" style="display:none">
  <div id="dashErr"></div>

  <div class="cards" id="overviewCards"></div>

  <div class="section-title">Signups</div>
  <div class="table-wrap"><div class="tbl-scroll"><table class="tbl">
    <thead><tr>
      <th>Name</th><th>Trade &middot; City</th><th>Email</th><th>Signed up</th>
      <th>Profile</th><th>Subscriptions</th><th>Site</th>
    </tr></thead>
    <tbody id="contractorRows"></tbody>
  </table></div></div>

  <div class="section-title">Active subscriptions</div>
  <div class="table-wrap"><div class="tbl-scroll"><table class="tbl">
    <thead><tr>
      <th>Business</th><th>Email</th><th>Tools</th><th>Monthly value</th><th>Started</th><th>Status</th>
    </tr></thead>
    <tbody id="subRows"></tbody>
  </table></div></div>

  <div class="section-title">Recent activity</div>
  <div class="feed" id="activityFeed"></div>

  <div class="section-title">Failed / canceled subscriptions</div>
  <div class="failed" id="failedSection"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// PASSWORD GATE
// Stores the password in sessionStorage so a refresh doesn't re-prompt; the
// server still validates every request against ADMIN_PASSWORD via header.
// ─────────────────────────────────────────────────────────────────────────────
var STORE_KEY = 'bedrock_admin_pw';
function getPw(){ try { return sessionStorage.getItem(STORE_KEY) || ''; } catch(e){ return ''; } }
function setPw(v){ try { if(v) sessionStorage.setItem(STORE_KEY, v); else sessionStorage.removeItem(STORE_KEY); } catch(e){} }
function signOut(){ setPw(''); location.reload(); }

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
function money(n){ return '$'+(Number(n)||0).toLocaleString('en-US',{maximumFractionDigits:0}); }
function dateShort(d){ if(!d) return '—'; var x=new Date(d); return isNaN(x)?'—':x.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function dateRel(d){
  if(!d) return '—';
  var s=Math.floor((Date.now()-new Date(d).getTime())/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+' min ago';
  if(s<86400) return Math.floor(s/3600)+' hr ago';
  if(s<604800) return Math.floor(s/86400)+' d ago';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function tryUnlock(e){
  if(e) e.preventDefault();
  var pw = (document.getElementById('gatePw').value||'').trim();
  if(!pw){ return; }
  var err = document.getElementById('gateErr');
  var btn = document.getElementById('gateBtn');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Checking…';
  fetchStats(pw).then(function(d){
    if(d && d.ok){
      setPw(pw);
      enterDash(d.data);
    } else {
      err.textContent = (d && d.msg) || 'Incorrect password';
      err.classList.add('show');
      btn.disabled = false; btn.textContent = 'Unlock dashboard';
    }
  });
}

function fetchStats(pw){
  return fetch('/.netlify/functions/admin-stats', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'X-Admin-Password': pw }
  }).then(function(r){
    if(r.status === 401) return r.json().then(function(j){ return { ok:false, msg:(j&&j.error)||'Incorrect password' }; });
    if(!r.ok) return r.json().then(function(j){ return { ok:false, msg:(j&&j.error)||('Server error '+r.status) }; }).catch(function(){ return { ok:false, msg:'Server error '+r.status }; });
    return r.json().then(function(j){ return { ok:true, data:j }; });
  }).catch(function(){ return { ok:false, msg:'Could not reach the server' }; });
}

function enterDash(data){
  document.getElementById('gate').style.display = 'none';
  document.getElementById('dash').style.display = '';
  document.getElementById('signOutBtn').style.display = '';
  document.getElementById('barUser').textContent = 'Brock';
  render(data);
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render(d){
  renderOverview(d);
  renderContractors(d);
  renderSubscriptions(d);
  renderActivity(d);
  renderFailed(d);
}

// Pre-beta task #3: monthly price for every SKU. Keep this in sync with the
// price/SKU map portal.html + create-subscription-checkout use. cfo and
// finance_operations are the same Donna + Finance bundle.
var SUB_PRICE = { website: 20, marketing: 30, finance_operations: 70, cfo: 70, operations: 40, finance: 35 };
var SUB_LABEL = { website: 'Sites', marketing: 'Marketing', finance_operations: 'Finance &amp; Operations', cfo: 'Finance &amp; Operations', operations: 'Operations', finance: 'Finance' };

function mrrFor(subs){
  return (subs||[])
    .filter(function(s){ return s.status === 'active' || s.status === 'past_due'; })
    .reduce(function(sum, s){ return sum + (SUB_PRICE[s.tool] || 0); }, 0);
}

function renderOverview(d){
  var c = d.counts || {};
  var failed = c.failed_count || 0;
  var mrr = mrrFor(d.subscriptions || []);
  document.getElementById('overviewCards').innerHTML =
    card('Total accounts',     c.total_contractors||0,   c.sites_total!=null ? c.sites_total+' live sites' : '') +
    card('Active subscriptions', c.active_paying_total||0, toolBreakdown(c.active_by_tool||{}), 'gold') +
    card('Total MRR',          money(mrr),               (c.new_week||0)+' new this week', 'gold') +
    card('Past due / canceled', failed,                  failed>0 ? 'Needs attention' : 'All good', failed>0 ? 'red' : '');
}
function card(label, val, sub, cls){
  return '<div class="card '+(cls||'')+'"><div class="lbl">'+esc(label)+'</div>'
    +'<div class="val">'+esc(String(val))+'</div>'
    +(sub?'<div class="sub">'+sub+'</div>':'')+'</div>';
}
function toolBreakdown(byTool){
  var keys = Object.keys(byTool); if(!keys.length) return 'No paying subs yet';
  var names = { marketing:'Marketing', finance_operations:'Finance &amp; Ops', cfo:'Finance &amp; Ops', website:'Sites' };
  return keys.map(function(k){ return '<strong>'+(byTool[k])+'</strong> '+(names[k]||esc(k)); }).join(' · ');
}

function renderContractors(d){
  var profiles = d.profiles || [];
  var subs = d.subscriptions || [];
  var sites = d.sites || [];
  // index subs by user_id
  var subsBy = {};
  subs.forEach(function(s){ if(!subsBy[s.user_id]) subsBy[s.user_id]=[]; subsBy[s.user_id].push(s); });
  // index sites by user_id (sites may have user_id, lead_id, or email)
  var sitesBy = {};
  sites.forEach(function(s){
    var uid = s.user_id || s.lead_user_id || null;
    if(uid){ if(!sitesBy[uid]) sitesBy[uid]=[]; sitesBy[uid].push(s); }
  });
  var tb = document.getElementById('contractorRows');
  if(!profiles.length){ tb.innerHTML='<tr><td colspan="7" class="empty">No contractors yet.</td></tr>'; return; }
  tb.innerHTML = profiles.map(function(p){
    var ps = subsBy[p.user_id] || [];
    var has = {};
    ps.forEach(function(s){ if(s.status==='active'||s.status==='past_due') has[s.tool]=s.status; });
    var tools = ['website','marketing','finance_operations','cfo'];
    var labels = { website:'Sites', marketing:'Marketing', finance_operations:'Fin/Ops', cfo:'Fin/Ops' };
    var toolDots = tools.filter(function(t){ return labels[t]; }).map(function(t){
      var on = !!has[t];
      return '<span><span class="tool-dot'+(on?' on':'')+'"></span>'+esc(labels[t])+'</span>';
    }).join('');
    // dedupe labels (finance_operations + cfo render same)
    var seen={}; var deduped='';
    var match = toolDots.match(/<span>.*?<\/span>/g) || [];
    match.forEach(function(s){ var key=s.replace(/<[^>]+>/g,''); if(!seen[key]){ seen[key]=true; deduped+=s; } });

    var ms = sitesBy[p.user_id] || [];
    var site = ms[0]; var siteUrl = site && (site.live_url || site.url);
    var pill = '';
    if(p.is_admin) pill = '<span class="pill admin">Admin</span>';
    var statuses = ps.map(function(s){return s.status;}).filter(function(s,i,a){return a.indexOf(s)===i;});
    var subPills = statuses.map(function(st){ return '<span class="pill '+esc(st)+'">'+esc(st.replace('_',' '))+'</span>'; }).join(' ');
    // Pre-beta task #3: profile % complete — only the fields exposed by admin-stats
    // contribute (avoids stale guesses about fields we never see here).
    var profileFields = ['business_name','contact_name','email','phone','trade','city'];
    var filled = profileFields.filter(function(k){ return p[k] != null && String(p[k]).trim() !== ''; }).length;
    var pct = Math.round((filled / profileFields.length) * 100);
    var pctClass = pct >= 80 ? 'pct-ok' : (pct >= 50 ? 'pct-mid' : 'pct-low');
    return '<tr>'
      +'<td><span class="name">'+esc(p.business_name||p.contact_name||'&mdash;')+'</span>'
        +(p.contact_name && p.business_name?'<div class="muted">'+esc(p.contact_name)+'</div>':'')+'</td>'
      +'<td>'+esc(p.trade||'&mdash;')+(p.city?'<div class="muted">'+esc(p.city)+'</div>':'')+'</td>'
      +'<td><a href="mailto:'+esc(p.email||'')+'">'+esc(p.email||'&mdash;')+'</a></td>'
      +'<td>'+dateShort(p.created_at)+'</td>'
      +'<td><span class="pct '+pctClass+'">'+pct+'%</span></td>'
      +'<td><div class="tool-row">'+(deduped||'<span class="muted">none</span>')+'</div>'
        +(subPills?'<div style="margin-top:4px">'+subPills+(pill?' '+pill:'')+'</div>':(pill?'<div style="margin-top:4px">'+pill+'</div>':''))+'</td>'
      +'<td>'+(siteUrl?'<a href="'+esc(siteUrl)+'" target="_blank" rel="noopener">View &rarr;</a>':'<span class="muted">&mdash;</span>')+'</td>'
      +'</tr>';
  }).join('');
}

function renderSubscriptions(d){
  var tb = document.getElementById('subRows'); if(!tb) return;
  var subs = (d.subscriptions || []).filter(function(s){ return s.status === 'active' || s.status === 'past_due' || s.status === 'canceled'; });
  if (!subs.length) { tb.innerHTML = '<tr><td colspan="6" class="empty">No subscriptions yet.</td></tr>'; return; }
  // Index profiles by user_id so we can show business + email next to each sub.
  var profilesBy = {};
  (d.profiles||[]).forEach(function(p){ profilesBy[p.user_id] = p; });
  // Sort active first, then by start date desc.
  subs.sort(function(a,b){
    var rank = { active:0, past_due:1, canceled:2 };
    if ((rank[a.status]||9) !== (rank[b.status]||9)) return (rank[a.status]||9) - (rank[b.status]||9);
    return new Date(b.created_at||0) - new Date(a.created_at||0);
  });
  tb.innerHTML = subs.map(function(s){
    var p = profilesBy[s.user_id] || {};
    var biz = p.business_name || p.contact_name || '&mdash;';
    var em  = p.email || '';
    var label = SUB_LABEL[s.tool] || esc(s.tool);
    var price = SUB_PRICE[s.tool];
    return '<tr>'
      + '<td><span class="name">'+esc(biz)+'</span></td>'
      + '<td>'+(em?'<a href="mailto:'+esc(em)+'">'+esc(em)+'</a>':'<span class="muted">&mdash;</span>')+'</td>'
      + '<td>'+label+'</td>'
      + '<td>'+(price ? money(price)+'/mo' : '<span class="muted">&mdash;</span>')+'</td>'
      + '<td>'+dateShort(s.created_at)+'</td>'
      + '<td><span class="pill '+esc(s.status)+'">'+esc(s.status.replace('_',' '))+'</span></td>'
      + '</tr>';
  }).join('');
}

function renderActivity(d){
  var feed = document.getElementById('activityFeed');
  var items = d.recent_activity || [];
  if(!items.length){ feed.innerHTML='<div class="empty">No estimates or invoices yet.</div>'; return; }
  var profilesBy = {};
  (d.profiles||[]).forEach(function(p){ profilesBy[p.user_id]=p; });
  feed.innerHTML = items.map(function(it){
    var p = profilesBy[it.user_id];
    var who = p?(p.business_name||p.contact_name||p.email||'—'):'—';
    var jobMatch = String(it.notes||'').match(/Job:\s*([^—\n]+)/i);
    var job = jobMatch ? jobMatch[1].trim() : (it.notes||'').slice(0,50);
    return '<div class="feed-row">'
      +'<div class="feed-type '+esc(it.type)+'">'+(it.type==='invoice'?'Invoice':'Estimate')+'</div>'
      +'<div class="feed-who"><strong>'+esc(who)+'</strong>'+(job?' · <span style="color:var(--slate)">'+esc(job)+'</span>':'')+'</div>'
      +'<div class="feed-amt">'+money(it.total)+'</div>'
      +'<div class="feed-when">'+dateRel(it.created_at)+'</div></div>';
  }).join('');
}

function renderFailed(d){
  var box = document.getElementById('failedSection');
  var fails = d.failed_payments || [];
  if(!fails.length){
    box.innerHTML = '<div style="font-size:0.84rem;color:var(--slate);padding:0.5rem 0">No past-due or canceled subscriptions. ✓</div>';
    return;
  }
  var profilesBy = {};
  (d.profiles||[]).forEach(function(p){ profilesBy[p.user_id]=p; });
  box.innerHTML = fails.map(function(s){
    var p = profilesBy[s.user_id];
    var who = p ? (p.business_name||p.contact_name||p.email||'—') : '—';
    var email = p ? p.email : '';
    return '<div class="row">'
      +'<div class="who">'+esc(who)+(email?(' · <a href="mailto:'+esc(email)+'">'+esc(email)+'</a>'):'')+'</div>'
      +'<span class="pill '+esc(s.status)+'">'+esc(s.tool)+' · '+esc(s.status.replace('_',' '))+'</span>'
      +(s.stripe_customer_id?'<span class="cust-id">'+esc(s.stripe_customer_id)+'</span>':'')
      +'</div>';
  }).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
(function init(){
  var pw = getPw();
  if(!pw) return;
  // Try the stored password silently — if it works, skip the gate.
  fetchStats(pw).then(function(d){
    if(d && d.ok){ enterDash(d.data); }
    else {
      // bad/expired password — clear and stay on gate
      setPw('');
    }
  });
})();
</script>
