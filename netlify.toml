[build]
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Nightly QuickBooks cache refresh for the Finance dashboard.
# 08:00 UTC ≈ 2:00 AM US Central (Netlify cron runs in UTC).
[functions."finance-sync-nightly"]
  schedule = "0 8 * * *"

# Daily onboarding email scheduler — sends day-2 and day-7 emails to
# contractors hitting those signup-anniversaries. 14:00 UTC ≈ 8 AM US Central
# so they land first thing in the morning their time.
[functions."onboarding-email-scheduler"]
  schedule = "0 14 * * *"

# G12 (Batch G, 2026-05-26): referral landing URL. /ref/SMITH10 → home with
# the ref query param so the signup flow can stash and apply the code.
[[redirects]]
  from = "/ref/*"
  to = "/?ref=:splat"
  status = 302

# Pre-beta task #6: catch-all 404. Real files and Netlify Functions match
# before this rule does, so this only fires for genuinely missing routes.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
